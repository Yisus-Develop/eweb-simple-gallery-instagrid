name: Release Plugin

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build plugin zip
        run: |
          mkdir -p dist
          zip -r "dist/simple-gallery-instagrid.zip" .             -x ".git/*"             -x ".github/*"             -x "dist/*"             -x "*.DS_Store"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/simple-gallery-instagrid.zip
          generate_release_notes: true
